name: gitops

on:
  pull_request:
    paths:
      - "bootstrap/**"
      - "platform-addons/**"
      - "apps/**"
      - ".github/workflows/gitops.yml"
  push:
    branches: [main]
    paths: ["bootstrap/**", "platform-addons/**", "apps/**"]

permissions:
  contents: read

jobs:
  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize + kubeconform
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/
          KC=v0.6.7
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KC}/kubeconform-linux-amd64.tar.gz" \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Build and validate every overlay
        run: |
          set -euo pipefail
          overlays=$(find bootstrap platform-addons apps \
                      -name kustomization.yaml -path '*overlays*' \
                      -exec dirname {} \; 2>/dev/null | sort -u)
          if [ -z "$overlays" ]; then echo "no overlays yet"; exit 0; fi
          for o in $overlays; do
            echo "::group::$o"
            kustomize build "$o" \
              | kubeconform -strict -ignore-missing-schemas -summary \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            echo "::endgroup::"
          done
