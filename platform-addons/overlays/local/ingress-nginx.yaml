# ingress-nginx for kind. Same nested-Application pattern as dev, tuned for a
# single-node local cluster:
#   - NodePort service on 30080/30443 (kind maps 30080 -> localhost:8080)
#   - publish-status-address=localhost so Ingress objects get a status address
#     and reconcile Healthy without a cloud load balancer.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      values: |
        controller:
          ingressClassResource:
            name: nginx
            default: true
          service:
            type: NodePort
            nodePorts:
              http: 30080
              https: 30443
          publishService:
            enabled: false
          extraArgs:
            publish-status-address: localhost
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
