apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# local (kind): just the ingress controller. No base — the self-signed
# ClusterIssuer is skipped so kind needs no cert-manager (local apps are plain
# HTTP). ESO/cert-manager are the seams Terraform would own on AWS.
resources:
  - ingress-nginx.yaml
