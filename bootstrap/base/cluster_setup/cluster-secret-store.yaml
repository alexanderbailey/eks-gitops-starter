# The cluster-wide entry point into AWS Secrets Manager for External Secrets.
# Every app's ExternalSecret references this store by name (aws-secrets-manager)
# and never talks to AWS directly.
#
# Auth is intentionally omitted: the ESO controller's ServiceAccount gets its
# AWS role via EKS Pod Identity (see infra/modules/addons/external-secrets.tf),
# so the AWS SDK's default credential chain just works — no keys, no IRSA.
#
# For local kind runs, P5 swaps this for a fake in-cluster store; the apps'
# ExternalSecret manifests stay identical.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      # Match your AWS_REGION (see .env). All environments default to eu-west-2.
      region: eu-west-2
