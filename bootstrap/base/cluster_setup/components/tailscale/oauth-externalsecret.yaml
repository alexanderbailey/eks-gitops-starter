# The operator's Tailscale OAuth client, synced from AWS Secrets Manager by
# External Secrets into the Secret the operator expects (operator-oauth).
# Store the client under TAILSCALE_OAUTH_SECRET (default key: tailscale/oauth)
# with JSON fields client_id and client_secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: operator-oauth
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: tailscale/oauth
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: tailscale/oauth
        property: client_secret
