# Install: pipx install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        # Kustomize/Argo CD use YAML features check-yaml can't parse.
        exclude: '(kustomization\.ya?ml|overlays/|/apps/|/bootstrap/|/platform-addons/)'
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args: ["--tf-init-args=-backend=false"]
      - id: terraform_tflint

  - repo: https://github.com/aquasecurity/trivy
    rev: v0.58.0
    hooks:
      - id: trivy
        name: trivy config (IaC scan)
        args: ["config", "--exit-code", "1", "--severity", "HIGH,CRITICAL", "infra/"]
        pass_filenames: false

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
