apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: db-service
resources:
  - deployment.yaml
# db-credentials (Secret) and db-config (ConfigMap) are provided per overlay:
#   dev        -> a static Secret + an in-cluster Postgres
#   staging/prod -> an ExternalSecret (from RDS via Secrets Manager) + endpoint config
