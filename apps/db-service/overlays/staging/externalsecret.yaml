# staging: credentials come from AWS Secrets Manager (the RDS-managed master
# secret) via External Secrets — no secret material in Git. ESO reads the JSON
# secret and templates it into the PGUSER/PGPASSWORD keys db-service expects.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: db-credentials
    creationPolicy: Owner
    template:
      data:
        PGUSER: "{{ .username }}"
        PGPASSWORD: "{{ .password }}"
  data:
    # RDS auto-generates the master secret's name. Set this to it — from
    # `terraform output rds_master_user_secret_arn` (the secret name or ARN).
    - secretKey: username
      remoteRef:
        key: REPLACE-with-rds-master-secret-name
        property: username
    - secretKey: password
      remoteRef:
        key: REPLACE-with-rds-master-secret-name
        property: password
