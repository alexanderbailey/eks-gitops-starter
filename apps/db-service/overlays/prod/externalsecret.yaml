# prod: identical wiring to staging — credentials from the RDS-managed master
# secret in AWS Secrets Manager via External Secrets, never in Git.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: db-credentials
    creationPolicy: Owner
    template:
      data:
        PGUSER: "{{ .username }}"
        PGPASSWORD: "{{ .password }}"
  data:
    # From `terraform output rds_master_user_secret_arn` (the secret name or ARN).
    - secretKey: username
      remoteRef:
        key: REPLACE-with-rds-master-secret-name
        property: username
    - secretKey: password
      remoteRef:
        key: REPLACE-with-rds-master-secret-name
        property: password
