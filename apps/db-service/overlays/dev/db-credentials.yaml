# dev-only static credentials. NOT sensitive and NOT for staging/prod — those
# get their credentials from AWS Secrets Manager via an ExternalSecret. The keys
# double as libpq env vars (PGUSER/PGPASSWORD) so db-service consumes them as-is.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  PGUSER: demo
  PGPASSWORD: demo-password
