apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

replicas:
  - name: frontend-nginx
    count: 2

# prod: public via ALB, TLS from the letsencrypt (production) ClusterIssuer.
# Replace the example.com host with your CLUSTER_DOMAIN.
patches:
  - target:
      kind: Ingress
      name: frontend-nginx
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          alb.ingress.kubernetes.io/scheme: internet-facing
          alb.ingress.kubernetes.io/target-type: ip
          cert-manager.io/cluster-issuer: letsencrypt
      - op: add
        path: /spec/ingressClassName
        value: alb
      - op: add
        path: /spec/rules/0/host
        value: frontend.example.com
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - frontend.example.com
            secretName: frontend-nginx-tls
